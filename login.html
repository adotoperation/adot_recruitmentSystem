<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 에이닷 신규 강사 지원 정보</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 60px 40px;
            border-radius: var(--radius);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0, 0, 1);
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .login-logo {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }
        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 500;
        }
        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .input-group input {
            width: 100%;
            padding: 20px 24px;
            border-radius: 18px;
            border: 1px solid #e1e1e1;
            background: #f8f9fa;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 22px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3);
        }
        .login-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 122, 255, 0.4);
        }
        .login-btn:active {
            transform: translateY(-1px);
        }
        #login-error {
            margin-top: 20px;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="login-logo">A•DOT</h1>
        <p class="login-subtitle">신규 강사 지원 정보 대시보드</p>
        
        <form id="login-form">
            <div class="input-group">
                <label>지점명</label>
                <input type="text" id="login-branch" placeholder="지점명을 입력하세요" required autocomplete="username">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="login-password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
            </div>
            
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 30px; cursor: pointer;">
                <input type="checkbox" id="remember-me" style="width: 18px; height: 18px; cursor: pointer;">
                <label for="remember-me" style="font-size: 0.95rem; font-weight: 600; color: #666; cursor: pointer; user-select: none;">로그인 정보 저장</label>
            </div>

            <button type="submit" class="login-btn" id="login-btn">로그인</button>
            <p id="login-error">지점명 또는 비밀번호가 올바르지 않습니다.</p>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
